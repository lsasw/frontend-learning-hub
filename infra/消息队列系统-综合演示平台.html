<html lang="zh-CN">
<head>

<title>消息队列系统 · 综合演示平台</title>
<style>
:root {
  --bg0: #0d1117; --bg1: #161b22; --bg2: #21262d; --bg3: #30363d;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --accent: #58a6ff; --accent2: #79c0ff;
  --green: #3fb950; --green2: #56d364;
  --red: #f85149; --orange: #d29922; --purple: #a371f7;

  --border: #30363d; --radius: 8px;
  --mono: 'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg0);color:var(--text);overflow:hidden;height:100vh}
/* HEADER */
.header{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header .logo{font-weight:900;font-size:1.05rem;color:var(--accent);display:flex;align-items:center;gap:8px}
.header .logo span{color:var(--text2);font-weight:400;font-size:.78rem}
.header .metrics{display:flex;gap:20px;margin-left:auto;align-items:center}
.header .metric{text-align:center}
.header .metric .val{font-size:1.1rem;font-weight:700;font-family:var(--mono)}
.header .metric .lbl{font-size:.68rem;color:var(--text3);text-transform:uppercase}
.header .metric .val.g{color:var(--green)}.header .metric .val.r{color:var(--red)}.header .metric .val.o{color:var(--orange)}
/* STATUS BAR */
.status-bar{background:var(--bg1);border-bottom:1px solid var(--border);padding:4px 20px;display:flex;gap:12px;font-size:.72rem;color:var(--text2);flex-shrink:0;height:28px;align-items:center;overflow-x:auto}
.status-bar .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-bar .dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-bar .dot.offline{background:var(--red)}
.status-bar .dot.warn{background:var(--orange)}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 80px)}
/* SIDEBAR */
.sidebar{width:220px;background:var(--bg1);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 0}
.sidebar .nav-item{padding:10px 20px;cursor:pointer;font-size:.82rem;color:var(--text2);display:flex;align-items:center;gap:10px;transition:all .15s;border-left:3px solid transparent}
.sidebar .nav-item:hover{color:var(--text);background:var(--bg2)}
.sidebar .nav-item.active{color:var(--accent);background:rgba(88,166,255,.08);border-left-color:var(--accent)}
.sidebar .nav-item .icon{font-size:1rem;width:20px;text-align:center}
.sidebar .cat{font-size:.68rem;color:var(--text3);padding:16px 20px 6px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px}
.panel{display:none}
.panel.active{display:block}
.panel h2{font-size:1.25rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.panel h2 .badge{font-size:.72rem;padding:3px 10px;border-radius:12px;font-weight:600}
.panel h2 .badge.blue{background:rgba(88,166,255,.15);color:var(--accent)}
.panel h2 .badge.green{background:rgba(63,185,80,.15);color:var(--green)}
.panel h2 .badge.purple{background:rgba(163,113,247,.15);color:var(--purple)}
/* CARDS */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h3{font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--accent2)}
.card-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
/* STAT CARD */
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:900;font-family:var(--mono)}
.stat-card .num.g{color:var(--green)}.stat-card .num.b{color:var(--accent)}.stat-card .num.r{color:var(--red)}.stat-card .num.p{color:var(--purple)}.stat-card .num.o{color:var(--orange)}.stat-card .num.c{color:var(--cyan)}
.stat-card .label{font-size:.72rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
/* CANVAS */
.canvas-wrap{position:relative;background:var(--bg0);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.canvas-wrap canvas{display:block;width:100%}
.canvas-wrap .overlay{position:absolute;top:12px;left:16px;font-size:.72rem;color:var(--text3);pointer-events:none}
/* CONTROLS */

.btn{padding:8px 16px;border:1px solid var(--border);background:var(--bg2);color:var(--text);border-radius:6px;cursor:pointer;font-size:.78rem;font-family:var(--sans);transition:all .15s;white-space:nowrap}

.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.btn.success{background:var(--green);border-color:var(--green);color:#000}
.btn.warn{background:var(--orange);border-color:var(--orange);color:#000}
.btn.sm{padding:4px 10px;font-size:.7rem}

/* TABLE */

th{background:var(--bg2);padding:8px 12px;text-align:left;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}

.tag.err{background:rgba(248,81,73,.15);color:var(--red)}

/* FLEX GRID */
.flex-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
/* NODE CARD */

.node-card:hover{border-color:var(--accent)}

.node-card .nc-header .nc-role.leader{background:rgba(163,113,247,.2);color:var(--purple)}
.node-card .nc-header .nc-role.follower{background:rgba(88,166,255,.15);color:var(--accent)}
.node-card .nc-stats{font-size:.7rem;color:var(--text2);font-family:var(--mono)}
.node-card .nc-bar{height:3px;background:var(--bg2);border-radius:2px;margin-top:6px;overflow:hidden}
.node-card .nc-bar .fill{height:100%;border-radius:2px;transition:width .3s}
/* MESSAGE ITEM */
.msg-log{max-height:300px;overflow-y:auto;background:var(--bg0);border-radius:6px;padding:8px;font-family:var(--mono);font-size:.72rem}
.msg-item{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
.msg-item .ts{color:var(--text3);flex-shrink:0}
.msg-item .tp{flex-shrink:0;padding:1px 6px;border-radius:3px;font-size:.64rem;font-weight:600}
.msg-item .tp.PUB{background:rgba(88,166,255,.15);color:var(--accent)}
.msg-item .tp.DLV{background:rgba(63,185,80,.15);color:var(--green)}
.msg-item .tp.ACK{background:rgba(163,113,247,.15);color:var(--purple)}
.msg-item .tp.RETRY{background:rgba(210,153,34,.15);color:var(--orange)}
.msg-item .tp.DLQ{background:rgba(248,81,73,.15);color:var(--red)}
.msg-item .tp.TX{background:rgba(227,179,65,.15);color:var(--yellow)}
.msg-item .body{color:var(--text2);word-break:break-all}
/* SVG */
.svg-box{text-align:center;overflow-x:auto}
/* TOOLTIP */
.tooltip{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:.72rem;pointer-events:none;z-index:999;display:none}
/* SLIDER */
input[type=range]{-webkit-appearance:none;background:var(--bg2);height:4px;border-radius:2px;outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.slider-group{display:flex;align-items:center;gap:10px}
.slider-group label{font-size:.74rem;color:var(--text2);min-width:70px}
.slider-group .val{font-size:.74rem;color:var(--accent);font-family:var(--mono);min-width:40px}
/* ANIMATION */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}
@keyframes flow{0%{offset-distance:0}100%{offset-distance:100%}}

<script>
// ============================================================
// CORE SIMULATION ENGINE
// ============================================================

// --- Message ---
let msgIdCounter = 0;
class Message {
  constructor(topic, payload, headers = {}) {
    this.id = `msg-${++msgIdCounter}`;
    this.topic = topic;
    this.payload = payload;
    this.headers = headers;
    this.timestamp = Date.now();
    this.status = 'published'; // published | delivered | acked | retrying | dead
    this.retryCount = 0;
    this.deliveryTag = null;
    this.offset = -1;
  }
}

// --- Partition (Kafka-style) ---
class Partition {
  constructor(id, topic) {
    this.id = id;
    this.topic = topic;
    this.leader = null; // broker id
    this.replicas = [];
    this.segments = []; // log segments
    this.nextOffset = 0;
    this.highWatermark = 0;
    this.messages = [];
  }
  append(msg) {
    msg.offset = this.nextOffset++;
    msg.partition = this.id;
    this.messages.push(msg);
    this.highWatermark = msg.offset;
    return msg.offset;
  }
  read(fromOffset, maxCount = 100) {
    const start = Math.max(0, fromOffset);
    return this.messages.slice(start, start + maxCount);
  }
}

// --- Exchange Binding (RabbitMQ-style) ---
class Binding {
  constructor(source, routingKey, destination) {
    this.source = source; this.routingKey = routingKey; this.destination = destination;
  }
}
class Exchange {
  constructor(name, type = 'direct') {
    this.name = name; this.type = type; // direct | topic | fanout | headers
    this.bindings = [];
  }
  bind(routingKey, queue) {
    this.bindings.push(new Binding(this.name, routingKey, queue));
  }
  route(routingKey) {
    if (this.type === 'fanout') return this.bindings.map(b => b.destination);
    if (this.type === 'topic') {
      return this.bindings.filter(b => {
        const pattern = b.routingKey.replace(/\./g, '\\.').replace(/\*/g, '[^.]+').replace(/#/g, '.*');
        return new RegExp(`^${pattern}$`).test(routingKey);
      }).map(b => b.destination);
    }
    // direct / headers
    return this.bindings.filter(b => b.routingKey === routingKey).map(b => b.destination);
  }
}

// --- Transaction Coordinator (RocketMQ-style) ---
class TransactionCoordinator {
  constructor() {
    this.halfMessages = new Map(); // msgId -> {msg, status, timer}
    this.checkTimeout = 60_000; // 60s check back
  }
  prepare(msg) {
    msg.status = 'half';
    this.halfMessages.set(msg.id, { msg, status: 'prepared' });
    // simulate check-back timer
    setTimeout(() => {
      const record = this.halfMessages.get(msg.id);
      if (record && record.status === 'prepared') {
        this.checkBack(msg.id);
      }
    }, this.checkTimeout);
    return msg.id;
  }
  commit(msgId) {
    const record = this.halfMessages.get(msgId);
    if (record) { record.status = 'committed'; record.msg.status = 'published'; }
    return record?.status === 'committed';
  }
  rollback(msgId) {
    const record = this.halfMessages.get(msgId);
    if (record) { record.status = 'rolled_back'; record.msg.status = 'dead'; }
    return record?.status === 'rolled_back';
  }
  checkBack(msgId) {
    const record = this.halfMessages.get(msgId);
    if (record && record.status === 'prepared') {
      // simulate uncertain: 30% rollback on check
      if (Math.random() < 0.3) {
        this.rollback(msgId);
        return 'rolled_back';
      } else {
        this.commit(msgId);
        return 'committed';
      }
    }
    return record?.status || 'unknown';
  }
}

// --- Tenant (Pulsar-style) ---
class Tenant {
  constructor(name) {
    this.name = name;
    this.namespaces = new Map();
    this.storageTier = 'ssd'; // ssd | hdd | archive
    this.quota = { maxTopics: 100, maxStorage: 1024 * 1024 * 1024, maxThroughput: 10000 };
  }
  createNamespace(ns) {
    this.namespaces.set(ns, { name: ns, topics: new Map(), storageUsed: 0 });
  }
}
class TenantManager {
  constructor() {
    this.tenants = new Map();
  }
  createTenant(name) {
    if (!this.tenants.has(name)) this.tenants.set(name, new Tenant(name));
    return this.tenants.get(name);
  }
}

// --- Dead Letter Queue ---
class DeadLetterQueue {
  constructor() {
    this.messages = [];
    this.maxRetries = 3;
  }
  push(msg, reason) {
    msg.status = 'dead';
    msg.deadReason = reason;
    this.messages.push(msg);
    eventLog.push({ type: 'DLQ', msg: `消息 ${msg.id} 进入死信队列: ${reason}` });
  }
}

// --- Broker Node ---
class BrokerNode {
  constructor(id) {
    this.id = id;
    this.status = 'online'; // online | offline | partitioned
    this.role = 'follower'; // leader | follower | candidate
    this.partitions = new Map(); // partitionId -> Partition (leader)
    this.replicaPartitions = new Map(); // partitionId -> Partition (follower)
    this.exchanges = new Map();
    this.queues = new Map(); // queueName -> Message[]
    this.consumers = new Map(); // consumerId -> { offset, ackSet }
    this.metrics = { messagesIn: 0, messagesOut: 0, bytesIn: 0, bytesOut: 0, latency: [] };
    this.dlq = new DeadLetterQueue();
    this.partitioned = false; // network partition flag
  }
  recordLatency(ms) {
    this.metrics.latency.push(ms);
    if (this.metrics.latency.length > 100) this.metrics.latency.shift();
  }
  getLatencyP99() {
    if (this.metrics.latency.length === 0) return 0;
    const sorted = [...this.metrics.latency].sort((a, b) => a - b);
    return sorted[Math.floor(sorted.length * 0.99)] || sorted[sorted.length - 1];
  }
}

// --- Cluster Manager ---
class ClusterManager {
  constructor() {
    this.brokers = new Map();
    this.leader = null;
    this.epoch = 1;
    this.transactionCoordinator = new TransactionCoordinator();
    this.tenantManager = new TenantManager();
    this.partitions = new Map(); // global partition registry
    this.totalMessages = 0;
    this.messagesPerSecond = [];
  }
  addBroker(id) {
    const broker = new BrokerNode(id);
    this.brokers.set(id, broker);
    if (!this.leader) { broker.role = 'leader'; this.leader = id; }
    return broker;
  }
  removeBroker(id) {
    const broker = this.brokers.get(id);
    if (!broker) return;
    broker.status = 'offline';
    // reassign leader if needed
    if (this.leader === id) this.electLeader();
    // reassign partitions
    this.rebalance();
  }
  electLeader() {
    const online = [...this.brokers.values()].filter(b => b.status === 'online' && !b.partitioned);
    if (online.length === 0) { this.leader = null; return; }
    const newLeader = online.sort((a, b) => a.id.localeCompare(b.id))[0];
    newLeader.role = 'leader';
    this.leader = newLeader.id;
    this.epoch++;
    eventLog.push({ type: 'ELECT', msg: `Leader 选举完成: ${newLeader.id} (纪元 ${this.epoch})` });
    // demote others
    online.filter(b => b.id !== newLeader.id).forEach(b => b.role = 'follower');
  }
  rebalance() {
    const online = [...this.brokers.values()].filter(b => b.status === 'online');
    if (online.length === 0) return;
    // simple round-robin reassignment
    this.partitions.forEach((partition, pid) => {
      const idx = parseInt(pid.split('-')[1]) % online.length;
      partition.leader = online[idx].id;
      partition.replicas = online.filter(b => b.id !== online[idx].id).map(b => b.id);
    });
    eventLog.push({ type: 'REBALANCE', msg: `分区再平衡完成，${this.partitions.size} 个分区已重新分配` });
  }
  simulatePartition(brokerId) {
    const broker = this.brokers.get(brokerId);
    if (broker) { broker.partitioned = true; broker.role = 'follower'; }
    eventLog.push({ type: 'PARTITION', msg: `Broker ${brokerId} 进入网络分区（脑裂场景）` });
  }
  healPartition(brokerId) {
    const broker = this.brokers.get(brokerId);
    if (broker) broker.partitioned = false;
    this.electLeader();
    this.rebalance();
    eventLog.push({ type: 'HEAL', msg: `Broker ${brokerId} 网络分区已修复` });
  }
  getOnlineCount() {
    let count = 0;
    this.brokers.forEach(b => { if (b.status === 'online' && !b.partitioned) count++; });
    return count;
  }
  getTotalBacklog() {
    let total = 0;
    this.brokers.forEach(b => {
      b.queues.forEach(q => { total += q.length; });
    });
    return total;
  }
}

// ============================================================
// GLOBAL STATE
// ============================================================
const cluster = new ClusterManager();
const eventLog = [];
const MAX_LOG = 200;
let selectedTab = 'overview';
let animFrameId = null;
let statsInterval = null;
let currentTPS = 0;
let tpsCounter = 0;

// Initialize: 5 brokers, 4 partitions for a default topic
['Broker-0', 'Broker-1', 'Broker-2', 'Broker-3', 'Broker-4'].forEach(id => cluster.addBroker(id));
// Create 8 partitions for default topic
for (let i = 0; i < 8; i++) {
  const p = new Partition(i, 'default-topic');
  p.leader = `Broker-${i % 5}`;
  p.replicas = [`Broker-${(i + 1) % 5}`, `Broker-${(i + 2) % 5}`];
  cluster.partitions.set(`default-topic-${i}`, p);
  const leaderBroker = cluster.brokers.get(p.leader);
  if (leaderBroker) leaderBroker.partitions.set(`default-topic-${i}`, p);
  p.replicas.forEach(rid => {
    const rBroker = cluster.brokers.get(rid);
    if (rBroker) rBroker.replicaPartitions.set(`default-topic-${i}`, p);
  });
}
// Create default exchange (RabbitMQ-style)
const defaultExchange = new Exchange('amq.direct', 'direct');
const defaultQueue = [];
cluster.brokers.get('Broker-0').exchanges.set('amq.direct', defaultExchange);
cluster.brokers.get('Broker-0').queues.set('default-queue', defaultQueue);
defaultExchange.bind('order.created', 'default-queue');
defaultExchange.bind('order.paid', 'default-queue');
defaultExchange.bind('user.registered', 'user-queue');
if (!cluster.brokers.get('Broker-0').queues.has('user-queue')) {
  cluster.brokers.get('Broker-0').queues.set('user-queue', []);
}

// ============================================================
// MESSAGE FLOW SIMULATION
// ============================================================
const topics = ['order.created', 'order.paid', 'user.registered', 'stock.updated', 'trade.confirmed'];
const payloads = [
  '{"orderId":1001,"amount":299.99}', '{"userId":"u789","action":"login"}',
  '{"stockCode":"000001","price":12.56,"volume":1000}', '{"tradeId":"t456","status":"filled"}',
  '{"orderId":1002,"amount":599.00}', '{"userId":"u123","action":"purchase"}',
  '{"stockCode":"600519","price":1850.00,"volume":100}', '{"notification":"price_alert"}',
];

function generateMessage() {
  const topic = topics[Math.floor(Math.random() * topics.length)];
  const payload = payloads[Math.floor(Math.random() * payloads.length)];
  return new Message(topic, payload, { source: 'simulation', priority: Math.floor(Math.random() * 3) + 1 });
}

function publishMessage(msg) {
  cluster.totalMessages++;
  tpsCounter++;
  const routingKey = msg.topic;
  // Route through all online brokers' exchanges
  cluster.brokers.forEach(broker => {
    if (broker.status !== 'online' || broker.partitioned) return;
    // Check exchanges
    broker.exchanges.forEach(ex => {
      const destinations = ex.route(routingKey);
      destinations.forEach(dest => {
        if (broker.queues.has(dest)) {
          broker.queues.get(dest).push(msg);
          broker.metrics.messagesIn++;
        }
      });
    });
  });
  // Also write to partition (Kafka-style)
  const pid = `default-topic-${Math.floor(Math.random() * 8)}`;
  const partition = cluster.partitions.get(pid);
  if (partition) {
    partition.append(msg);
    const leaderBroker = cluster.brokers.get(partition.leader);
    if (leaderBroker && leaderBroker.status === 'online') {
      leaderBroker.metrics.messagesIn++;
    }
  }
  // Simulate latency
  const latency = 5 + Math.random() * 45;
  cluster.brokers.forEach(b => b.recordLatency(latency));
  // Log
  eventLog.push({ type: 'PUB', msg: `发布消息 ${msg.id} → topic:${msg.topic}` });
  if (eventLog.length > MAX_LOG) eventLog.shift();
}

function consumeMessage() {
  let consumed = false;
  cluster.brokers.forEach(broker => {
    if (broker.status !== 'online') return;
    broker.queues.forEach((queue, qName) => {
      if (queue.length > 0) {
        const msg = queue.shift();
        // Simulate ACK (90% success, 10% retry)
        if (Math.random() < 0.9) {
          msg.status = 'acked';
          broker.metrics.messagesOut++;
          eventLog.push({ type: 'ACK', msg: `消息 ${msg.id} 消费确认 → queue:${qName}` });
        } else {
          // Retry
          if (msg.retryCount < broker.dlq.maxRetries) {
            msg.retryCount++;
            msg.status = 'retrying';
            queue.push(msg); // back to queue
            eventLog.push({ type: 'RETRY', msg: `消息 ${msg.id} 消费失败，重试 #${msg.retryCount} → queue:${qName}` });
            broker.recordLatency(15 + Math.random() * 30);
          } else {
            broker.dlq.push(msg, `超过最大重试次数(${broker.dlq.maxRetries})`);
          }
        }
        consumed = true;
      }
    });
  });
  return consumed;
}

// Background simulation
function simulationTick() {
  // Publish 1-3 messages per tick
  const pubCount = Math.floor(Math.random() * 3) + 1;
  for (let i = 0; i < pubCount; i++) publishMessage(generateMessage());
  // Consume 1-4 messages
  for (let i = 0; i < 4; i++) consumeMessage();
  // Collect TPS
  currentTPS = tpsCounter;
  setTimeout(() => { tpsCounter = 0; }, 1000);
}

// Start simulation
setInterval(simulationTick, 800);
// TPS reset every second
setInterval(() => { currentTPS = tpsCounter; tpsCounter = 0; }, 1000);

// ============================================================
// CANVAS MESSAGE FLOW ANIMATION
// ============================================================
function startFlowAnimation(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 280 * 2;
  ctx.scale(2, 2);
  const W = canvas.offsetWidth;
  const H = 280;
  // Particles
  const particles = [];
  const nodes = [
    { x: 60, y: H / 2, label: 'Producer', color: '#58a6ff', w: 80, h: 36 },
    { x: W / 2 - 40, y: H / 2, label: 'Broker', color: '#d29922', w: 80, h: 36 },
    { x: W - 140, y: H / 2, label: 'Consumer', color: '#3fb950', w: 80, h: 36 },
  ];
  function spawnParticle() {
    particles.push({
      x: nodes[0].x + 80,
      y: nodes[0].y,
      target: 1,
      speed: 0.8 + Math.random() * 0.6,
      progress: 0,
      color: nodes[0].color,
      phase: 0, // 0: prod→broker, 1: broker→consumer
    });
  }
  function animate() {
    ctx.clearRect(0, 0, W, H);
    // Background
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);
    // Edges
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    // Prod → Broker
    ctx.beginPath();
    ctx.moveTo(nodes[0].x + 80, nodes[0].y);
    ctx.lineTo(nodes[1].x, nodes[1].y);
    ctx.stroke();
    // Broker → Consumer
    ctx.beginPath();
    ctx.moveTo(nodes[1].x + 80, nodes[1].y);
    ctx.lineTo(nodes[2].x, nodes[2].y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Nodes
    nodes.forEach(n => {
      ctx.fillStyle = '#161b22';
      ctx.strokeStyle = n.color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(n.x, n.y - 18, n.w, n.h, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = n.color;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x + n.w / 2, n.y + 4);
    });
    // Particles
    particles.forEach((p, idx) => {
      const from = p.phase === 0 ? nodes[0] : nodes[1];
      const to = p.phase === 0 ? nodes[1] : nodes[2];
      p.progress += p.speed / 100;
      if (p.progress >= 1) {
        if (p.phase === 0) { p.phase = 1; p.progress = 0; }
        else { particles.splice(idx, 1); return; }
      }
      const tx = from.x + 80 + (to.x - from.x - 80) * p.progress;
      const ty = from.y + (to.y - from.y) * p.progress;
      ctx.fillStyle = p.phase === 0 ? '#58a6ff' : '#3fb950';
      ctx.beginPath();
      ctx.arc(tx, ty, 4, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.fillStyle = p.phase === 0 ? 'rgba(88,166,255,0.3)' : 'rgba(63,185,80,0.3)';
      ctx.beginPath();
      ctx.arc(tx, ty, 8, 0, Math.PI * 2);
      ctx.fill();
    });
    // Spawn
    if (Math.random() < 0.08) spawnParticle();
    animFrameId = requestAnimationFrame(animate);
  }
  animate();
}

// ============================================================
// CANVAS METRICS CHART
// ============================================================
function startMetricsChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 200 * 2;
  ctx.scale(2, 2);
  const W = canvas.offsetWidth;
  const H = 200;
  const data = [];
  const MAX = 60;
  function animate() {
    data.push(currentTPS);
    if (data.length > MAX) data.shift();
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);
    // Grid
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 5; i++) {
      const y = 40 + (H - 60) * i / 4;
      ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(W - 20, y); ctx.stroke();
      ctx.fillStyle = '#6e7681'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
      ctx.fillText(Math.round((4 - i) * 15), 18, y + 3);
    }
    // Line
    if (data.length > 1) {
      ctx.strokeStyle = '#58a6ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      const maxVal = Math.max(...data, 10);
      data.forEach((v, i) => {
        const x = 20 + (W - 40) * i / (MAX - 1);
        const y = 40 + (H - 60) * (1 - v / maxVal);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
      // Fill
      ctx.lineTo(20 + (W - 40) * (data.length - 1) / (MAX - 1), H - 20);
      ctx.lineTo(20, H - 20);
      ctx.closePath();
      ctx.fillStyle = 'rgba(88,166,255,0.08)';
      ctx.fill();
    }
    // Labels
    ctx.fillStyle = '#8b949e'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`TPS: ${currentTPS}`, W / 2, 18);
    requestAnimationFrame(animate);
  }
  animate();
}

function updatePanelContent(panelId) {
  switch (panelId) {
    case 'overview':
      const ovTotal = document.getElementById('ovTotal');
      const ovTPS = document.getElementById('ovTPS');
      const ovLatency = document.getElementById('ovLatency');
      const ovOnline = document.getElementById('ovOnline');
      const ovBacklog = document.getElementById('ovBacklog');
      if (ovTotal) ovTotal.textContent = cluster.totalMessages;
      if (ovTPS) ovTPS.textContent = currentTPS;
      if (ovLatency) ovLatency.textContent = (cluster.brokers.get('Broker-0')?.getLatencyP99() || 0) + 'ms';
      if (ovOnline) ovOnline.textContent = cluster.getOnlineCount() + '/5';
      if (ovBacklog) ovBacklog.textContent = cluster.getTotalBacklog();
      break;

    case 'pubsub':
      // Event log
      const logEl = document.getElementById('eventLog');
      if (logEl && eventLog.length > 0) {
        logEl.innerHTML = eventLog.slice(-30).reverse().map(e =>
          `<div class="msg-item"><span class="ts">${new Date().toLocaleTimeString()}</span><span class="tp ${e.type}">${e.type}</span><span class="body">${e.msg}</span></div>`
        ).join('');
      }
      const pubCount = document.getElementById('pubCount');
      if (pubCount) pubCount.textContent = cluster.totalMessages;
      break;

    case 'deadletter':
      updateDLQPanel();
      break;

    case 'kafka':
      updatePartitionTable();
      break;

    case 'rabbitmq':
      updateBindingTable();
      break;

    case 'rocketmq':
      updateTXPanel();
      break;

    case 'pulsar':
      updatePulsarPanel();
      break;

    case 'cluster':
      updateClusterPanel();
      break;
  }
}

// ============================================================
// DYNAMIC CONTENT UPDATERS
// ============================================================
function updateDLQPanel() {
  let allDLQ = [];
  cluster.brokers.forEach(b => allDLQ.push(...b.dlq.messages));
  const dlqCount = document.getElementById('dlqCount');
  const dlqReasons = document.getElementById('dlqReasons');
  const dlqTable = document.getElementById('dlqTable');
  const retryCount = document.getElementById('retryCount');
  if (dlqCount) dlqCount.textContent = allDLQ.length;
  if (retryCount) {
    let retries = 0;
    cluster.brokers.forEach(b => { b.queues.forEach(q => { q.forEach(m => { if (m.status === 'retrying') retries++; }); }); });
    retryCount.textContent = retries;
  }
  if (dlqReasons && allDLQ.length > 0) {
    const reasons = {};
    allDLQ.forEach(m => { const r = m.deadReason || 'unknown'; reasons[r] = (reasons[r] || 0) + 1; });
    dlqReasons.innerHTML = Object.entries(reasons).map(([k, v]) => `<p>· ${k}: <strong style="color:var(--red)">${v}</strong></p>`).join('');
  }
  if (dlqTable) {
    if (allDLQ.length === 0) {
      dlqTable.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text3)">暂无死信消息</td></tr>';
    } else {
      dlqTable.innerHTML = allDLQ.slice(-20).reverse().map(m =>
        `<tr><td style="font-family:var(--mono);font-size:.7rem">${m.id}</td><td>${m.topic}</td><td>${m.retryCount}</td><td>${m.deadReason || 'N/A'}</td><td style="font-size:.7rem">${new Date(m.timestamp).toLocaleTimeString()}</td></tr>`
      ).join('');
    }
  }
}

function updatePartitionTable() {
  const tbl = document.getElementById('partitionTable');
  if (!tbl) return;
  tbl.innerHTML = [...cluster.partitions.values()].map(p =>
    `<tr><td style="font-family:var(--mono)">P${p.id}</td><td>${p.leader}</td><td>${p.replicas.join(', ')}</td><td>${p.nextOffset}</td><td>${p.messages.length}</td></tr>`
  ).join('');
}

function updateBindingTable() {
  const tbl = document.getElementById('bindingTable');
  if (!tbl) return;
  const broker = cluster.brokers.get('Broker-0');
  if (!broker) return;
  let rows = '';
  broker.exchanges.forEach(ex => {
    ex.bindings.forEach(b => {
      rows += `<tr><td style="font-family:var(--mono)">${ex.name}</td><td>${b.routingKey}</td><td>${b.destination}</td></tr>`;
    });
  });
  tbl.innerHTML = rows;
}

function updateTXPanel() {
  const halfMsgs = cluster.transactionCoordinator.halfMessages;
  const prepared = [...halfMsgs.values()].filter(v => v.status === 'prepared').length;
  const committed = [...halfMsgs.values()].filter(v => v.status === 'committed').length;
  const rolled = [...halfMsgs.values()].filter(v => v.status === 'rolled_back').length;
  const txHalf = document.getElementById('txHalf');
  const txCommitted = document.getElementById('txCommitted');
  const txRolled = document.getElementById('txRolled');
  if (txHalf) txHalf.textContent = prepared;
  if (txCommitted) txCommitted.textContent = committed;
  if (txRolled) txRolled.textContent = rolled;
}

function updatePulsarPanel() {
  const tenantTable = document.getElementById('tenantTable');
  const tenantList = document.getElementById('tenantList');
  if (tenantTable) {
    let rows = '';
    cluster.tenantManager.tenants.forEach(t => {
      t.namespaces.forEach(ns => {
        rows += `<tr><td><strong>${t.name}</strong></td><td>${ns.name}</td><td><span class="tag ${t.storageTier === 'ssd' ? 'ok' : 'warn'}">${t.storageTier.toUpperCase()}</span></td><td>${t.quota.maxTopics}</td><td>${t.quota.maxThroughput}/s</td></tr>`;
      });
    });
    tenantTable.innerHTML = rows;
  }
  if (tenantList) {
    tenantList.innerHTML = [...cluster.tenantManager.tenants.values()].map(t =>
      `<div class="node-card" style="margin-bottom:8px">
        <div class="nc-header"><span class="nc-dot online"></span><span class="nc-name">${t.name}</span><span class="nc-role leader">${t.storageTier.toUpperCase()}</span></div>
        <div class="nc-stats">命名空间: ${t.namespaces.size} | 配额: ${t.quota.maxStorage / 1024 / 1024}MB</div>
        <div class="nc-bar"><div class="fill" style="width:${Math.random()*40+10}%;background:var(--purple)"></div></div>
      </div>`
    ).join('');
  }
}

function updateClusterPanel() {
  const nodeGrid = document.getElementById('nodeGrid');
  if (!nodeGrid) return;
  nodeGrid.innerHTML = [...cluster.brokers.values()].map(b => {
    const isOnline = b.status === 'online' && !b.partitioned;
    const isPartitioned = b.partitioned;
    const roleClass = b.role === 'leader' ? 'leader' : 'follower';
    const dotClass = isPartitioned ? 'warn' : isOnline ? 'online' : 'offline';
    const statusText = isPartitioned ? '网络分区' : isOnline ? '在线' : '离线';
    const pCount = b.partitions.size;
    const loadPct = Math.min(100, pCount * 12 + 10);
    return `<div class="node-card" onclick="toggleNode('${b.id}')">
      <div class="nc-header"><span class="nc-dot ${dotClass} ${isOnline ? 'pulse' : ''}"></span>
      <span class="nc-name">${b.id}</span><span class="nc-role ${roleClass}">${b.role.toUpperCase()}</span></div>
      <div class="nc-stats">状态: ${statusText} | 分区: ${pCount} | 消息入: ${b.metrics.messagesIn}</div>
      <div class="nc-bar"><div class="fill" style="width:${loadPct}%;background:${isOnline ? 'var(--green)' : 'var(--red)'}"></div></div>
    </div>`;
  }).join('');
}

// ============================================================
// SIMULATION ACTIONS
// ============================================================
function simulateCluster(action) {
  switch (action) {
    case 'downNode':
      const nodes = [...cluster.brokers.keys()];
      const target = nodes.find(id => cluster.brokers.get(id).status === 'online' && !cluster.brokers.get(id).partitioned);
      if (target) cluster.removeBroker(target);
      eventLog.push({ type: 'DOWN', msg: `节点 ${target} 已下线` });
      break;
    case 'partition':
      cluster.simulatePartition('Broker-3');
      cluster.simulatePartition('Broker-4');
      break;
    case 'recover':
      cluster.brokers.forEach(b => { b.status = 'online'; });
      cluster.healPartition('Broker-3');
      cluster.healPartition('Broker-4');
      cluster.electLeader();
      break;
    case 'rebalance':
      cluster.rebalance();
      break;
    case 'normal':
      cluster.brokers.forEach(b => { b.status = 'online'; b.partitioned = false; });
      cluster.electLeader();
      cluster.rebalance();
      break;
  }
  updateHeader();
  renderPanel(selectedTab);
}

function toggleNode(nodeId) {
  const broker = cluster.brokers.get(nodeId);
  if (!broker) return;
  if (broker.status === 'online') { cluster.removeBroker(nodeId); }
  else { broker.status = 'online'; cluster.electLeader(); cluster.rebalance(); }
  updateHeader();
  renderPanel(selectedTab);
}

function triggerNetPartition() {
  cluster.simulatePartition('Broker-3');
  cluster.simulatePartition('Broker-4');
  updateHeader();
  renderPanel(selectedTab);
}

function healNetPartition() {
  cluster.healPartition('Broker-3');
  cluster.healPartition('Broker-4');
  updateHeader();
  renderPanel(selectedTab);
}

function updateLatency(val) {
  const el = document.getElementById('latencyVal');
  if (el) el.textContent = val + 'ms';
}

function forceLeaderStepDown() {
  const leader = cluster.leader;
  if (leader) cluster.removeBroker(leader);
  updateHeader();
  renderPanel(selectedTab);
}

function forceElect() {
  cluster.electLeader();
  updateHeader();
  renderPanel(selectedTab);
}

function triggerRebalance() {
  cluster.rebalance();
  eventLog.push({ type: 'REBALANCE', msg: '手动触发分区再平衡' });
  updateHeader();
  updatePanelContent(selectedTab);
}

let lbStrategy = '轮询 (Round-Robin)';
function setLB(strategy) {
  const names = { roundrobin: '轮询 (Round-Robin)', weighted: '加权 (Weighted)', hash: '一致性哈希 (Consistent Hash)' };
  lbStrategy = names[strategy] || strategy;
  const el = document.getElementById('lbStrategy');
  if (el) el.textContent = lbStrategy;
  eventLog.push({ type: 'LB', msg: `切换负载均衡策略: ${lbStrategy}` });
}

function sendTransactionMsg() {
  const msg = generateMessage();
  msg.topic = 'order.transaction';
  cluster.transactionCoordinator.prepare(msg);
  eventLog.push({ type: 'TX', msg: `发送事务消息 ${msg.id} (Half 状态)` });
  cluster.totalMessages++;
  updatePanelContent(selectedTab);
  // Re-render RocketMQ SVG
  if (selectedTab === 'rocketmq') renderPanel('rocketmq');
}

function commitRandomTX() {
  const halfMsgs = cluster.transactionCoordinator.halfMessages;
  const prepared = [...halfMsgs.entries()].filter(([_, v]) => v.status === 'prepared');
  if (prepared.length > 0) {
    const [id] = prepared[Math.floor(Math.random() * prepared.length)];
    cluster.transactionCoordinator.commit(id);
    eventLog.push({ type: 'TX', msg: `事务消息 ${id} 已 Commit` });
    updatePanelContent(selectedTab);
    if (selectedTab === 'rocketmq') renderPanel('rocketmq');
  }
}

function rollbackRandomTX() {
  const halfMsgs = cluster.transactionCoordinator.halfMessages;
  const prepared = [...halfMsgs.entries()].filter(([_, v]) => v.status === 'prepared');
  if (prepared.length > 0) {
    const [id] = prepared[Math.floor(Math.random() * prepared.length)];
    cluster.transactionCoordinator.rollback(id);
    eventLog.push({ type: 'TX', msg: `事务消息 ${id} 已 Rollback` });
    updatePanelContent(selectedTab);
    if (selectedTab === 'rocketmq') renderPanel('rocketmq');
  }
}

function simulateFailure() {
  // Force some messages to retry
  for (let i = 0; i < 5; i++) {
    const msg = generateMessage();
    msg.retryCount = 0;
    cluster.brokers.forEach(b => {
      if (b.status !== 'online') return;
      b.queues.forEach(q => q.push(msg));
    });
    eventLog.push({ type: 'PUB', msg: `注入测试消息 ${msg.id} (将模拟消费失败)` });
  }
  // Force retry failures
  for (let i = 0; i < 3; i++) consumeMessage();
  // Force some to DLQ
  cluster.brokers.forEach(b => {
    b.queues.forEach(q => {
      q.forEach(m => {
        if (m.retryCount >= b.dlq.maxRetries) {
          b.dlq.push(m, `超过最大重试次数(${b.dlq.maxRetries})`);
        }
      });
    });
  });
  updateHeader();
  if (selectedTab === 'deadletter') updateDLQPanel();
}

function simulateForceRetry() {
  cluster.brokers.forEach(b => {
    const dlqMsgs = [...b.dlq.messages];
    b.dlq.messages = [];
    dlqMsgs.forEach(m => {
      m.retryCount = 0;
      m.status = 'published';
      b.queues.get('default-queue')?.push(m);
    });
  });
  eventLog.push({ type: 'RETRY', msg: '死信队列消息已重新入队' });
  updateHeader();
  if (selectedTab === 'deadletter') updateDLQPanel();
}

// ============================================================
// HEADER UPDATE
// ============================================================
function updateHeader() {
  document.getElementById('hdrTotal').textContent = cluster.totalMessages;
  document.getElementById('hdrTPS').textContent = currentTPS;
  document.getElementById('hdrLatency').textContent = (cluster.brokers.get('Broker-0')?.getLatencyP99() || 0) + 'ms';
  document.getElementById('hdrOnline').textContent = cluster.getOnlineCount() + '/5';
  document.getElementById('hdrBacklog').textContent = cluster.getTotalBacklog();
  const statusText = document.getElementById('statusText');
  if (statusText) {
    statusText.textContent = `集群状态: ${cluster.leader ? '正常运行' : '⚠️ 无 Leader'} | Leader: ${cluster.leader || 'N/A'} | 纪元: ${cluster.epoch} | 策略: ${lbStrategy.split(' ')[0]}`;
  }
}

// ============================================================
// NAVIGATION
// ============================================================
document.getElementById('sidebar').addEventListener('click', (e) => {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  const panelId = item.dataset.panel;
  if (!panelId) return;
  selectedTab = panelId;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  item.classList.add('active');
  renderPanel(panelId);
});

// ============================================================
// EVENT HANDLERS (delegated)
// ============================================================
document.getElementById('mainContent').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  switch (btn.id) {
    case 'btnPub': publishMessage(generateMessage()); updatePanelContent('pubsub'); break;
    case 'btnPubBatch': for (let i = 0; i < 10; i++) publishMessage(generateMessage()); updatePanelContent('pubsub'); break;
    case 'btnConsume': consumeMessage(); updatePanelContent('pubsub'); break;
  }
});

// ============================================================
// PERIODIC UI REFRESH
// ============================================================
statsInterval = setInterval(() => {
  updateHeader();
  if (selectedTab === 'overview') {
    updatePanelContent('overview');
  }
}, 1000);

// ============================================================
// INIT
// ============================================================
renderPanel('overview');
updateHeader();

console.log('🚀 消息队列系统 · 综合演示平台 已就绪');
console.log(`   Brokers: ${cluster.brokers.size} | Partitions: ${cluster.partitions.size} | Tenants: ${cluster.tenantManager.tenants.size}`);
console.log('   Tab 导航切换各模块 | 控制面板触发集群操作');
</script>
